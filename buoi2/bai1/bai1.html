<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contact Form</title>

<style>
* {
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #f2f2f2;
}

.container {
    width: 900px;
    margin: 40px auto;
    background: #fff;
    padding: 30px;
    border: 2px solid #ccc;
}

h2 {
    margin-bottom: 25px;
}

form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.row {
    display: flex;
    gap: 20px;
}

.row input {
    flex: 1;
}

.column input,
.column textarea {
    width: 100%;
}

input, textarea {
    padding: 12px;
    border: 1px solid #ccc;
    font-size: 14px;
}

textarea {
    height: 200px;
    resize: none;
}

.bottom {
    align-items: center;
    justify-content: space-between;
}

button {
    background: #79b6d9;
    color: white;
    border: none;
    padding: 12px 25px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #5aa4cc;
}

span {
    font-size: 14px;
    color: #666;
}
</style>

</head>
<body>

<div class="container">
    <h2>Get in touch with us by filling contact form below</h2>

    <form>

        <div class="row">
            <input type="text" placeholder="* Enter your full name">
            <input type="email" placeholder="* Enter your email address">
        </div>

        <div class="column">
            <input type="text" placeholder="Enter your subject">
        </div>

        <div class="column">
            <textarea placeholder="* Your message here..."></textarea>
        </div>

        <div class="row bottom">
            <button type="submit">Send message</button>
            <span>* Please fill all required form field, thanks!</span>
        </div>

    </form>
</div>

</body>
</html>
